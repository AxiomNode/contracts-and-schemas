openapi: 3.1.0
info:
  title: Internal Microservice Wordpass API
  version: 1.1.0
  description: Contrato interno consumido por bff-mobile y bff-backoffice.
servers:
  - url: http://microservice-wordpass:7101
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /games/models/random:
    get:
      summary: Obtiene wordpass aleatorios
      parameters:
        - in: query
          name: count
          schema:
            type: integer
            default: 5
        - in: query
          name: categoryId
          schema:
            type: string
        - in: query
          name: difficultyPercentage
          schema:
            type: integer
      responses:
        "200":
          description: Modelos de wordpass
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RandomModelsResponse"
        "404":
          description: Sin modelos disponibles
  /games/generate:
    post:
      summary: Genera un wordpass individual
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [categoryId]
              properties:
                categoryId:
                  type: string
                difficultyPercentage:
                  type: integer
                itemCount:
                  type: integer
                requestedBy:
                  type: string
                  enum: [api, backoffice]
      responses:
        "201":
          description: Wordpass generado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateResponse"
        "502":
          description: Error de generacion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Generacion temporalmente no disponible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /games/generate/process:
    post:
      summary: Inicia proceso de generacion batch (async)
      responses:
        "202":
          description: Proceso iniciado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationProcessResponse"
  /games/generate/process/wait:
    post:
      summary: Genera batch esperando finalizacion
      responses:
        "201":
          description: Batch completado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationProcessResponse"
  /games/generate/processes:
    get:
      summary: Lista procesos de generacion
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
            enum: [running, completed, failed]
        - in: query
          name: requestedBy
          schema:
            type: string
            enum: [api, backoffice]
      responses:
        "200":
          description: Lista de procesos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationProcessListResponse"
  /games/generate/process/{taskId}:
    get:
      summary: Estado de proceso especifico
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: includeItems
          schema:
            type: boolean
      responses:
        "200":
          description: Estado del proceso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationProcessDetailResponse"
        "404":
          description: Proceso no encontrado
  /games/ingest:
    post:
      summary: Ingesta de documentos al RAG del AI Engine
      responses:
        "202":
          description: Ingesta exitosa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResponse"
  /games/history:
    get:
      summary: Historial de generaciones almacenadas
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: categoryId
          schema:
            type: string
      responses:
        "200":
          description: Historial
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryListResponse"
  /games/history/manual:
    post:
      summary: Almacena entrada manual de curadores
      responses:
        "201":
          description: Entrada creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManualHistoryResponse"
  /games/history/{entryId}:
    delete:
      summary: Elimina entrada de historial
      parameters:
        - in: path
          name: entryId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Entrada eliminada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteHistoryResponse"
  /catalogs:
    get:
      summary: Catalogos disponibles
      responses:
        "200":
          description: Catalogos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogsResponse"
  /monitor/stats:
    get:
      summary: Estadisticas de monitoreo
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorStatsResponse"
  /monitor/logs:
    get:
      summary: Logs recientes
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorLogsResponse"
  /metrics:
    get:
      summary: Metricas Prometheus
      responses:
        "200":
          description: Metricas en formato text/plain
          content:
            text/plain:
              schema:
                type: string

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        service:
          type: string
        gameType:
          type: string
      additionalProperties: true
    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        error:
          type: string
        errors:
          type: object
          additionalProperties: true
      additionalProperties: true
    WordPassModel:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        categoryId:
          type: string
        difficultyPercentage:
          type: integer
        words:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    RandomModelsResponse:
      type: object
      required: [gameType, requested, returned, items]
      properties:
        gameType:
          type: string
          const: word-pass
        requested:
          type: integer
        returned:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/WordPassModel"
      additionalProperties: true
    GenerateResponse:
      type: object
      required: [gameType, generated]
      properties:
        gameType:
          type: string
          const: word-pass
        generated:
          $ref: "#/components/schemas/WordPassModel"
      additionalProperties: true
    GenerationTask:
      type: object
      properties:
        taskId:
          type: string
          format: uuid
        status:
          type: string
        requestedBy:
          type: string
        requested:
          type: integer
        processed:
          type: integer
        created:
          type: integer
        failed:
          type: integer
        progress:
          type: number
        message:
          type: string
        items:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    GenerationProcessResponse:
      type: object
      required: [gameType, message, task]
      properties:
        gameType:
          type: string
          const: word-pass
        message:
          type: string
        task:
          $ref: "#/components/schemas/GenerationTask"
      additionalProperties: true
    GenerationProcessListResponse:
      type: object
      required: [gameType, total, tasks]
      properties:
        gameType:
          type: string
          const: word-pass
        total:
          type: integer
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/GenerationTask"
      additionalProperties: true
    GenerationProcessDetailResponse:
      type: object
      required: [gameType, task]
      properties:
        gameType:
          type: string
          const: word-pass
        task:
          $ref: "#/components/schemas/GenerationTask"
      additionalProperties: true
    IngestResponse:
      type: object
      required: [gameType, ingested]
      properties:
        gameType:
          type: string
          const: word-pass
        ingested:
          type: integer
      additionalProperties: true
    HistoryEntry:
      type: object
      properties:
        id:
          type: string
        categoryId:
          type: string
        difficultyPercentage:
          type: integer
        requestedBy:
          type: string
        requestJson:
          type: object
          additionalProperties: true
        responseJson:
          type: object
          additionalProperties: true
      additionalProperties: true
    HistoryListResponse:
      type: object
      required: [gameType, items]
      properties:
        gameType:
          type: string
          const: word-pass
        items:
          type: array
          items:
            $ref: "#/components/schemas/HistoryEntry"
      additionalProperties: true
    ManualHistoryResponse:
      type: object
      required: [gameType, item]
      properties:
        gameType:
          type: string
          const: word-pass
        item:
          $ref: "#/components/schemas/HistoryEntry"
      additionalProperties: true
    DeleteHistoryResponse:
      type: object
      required: [gameType, deleted, id]
      properties:
        gameType:
          type: string
          const: word-pass
        deleted:
          type: boolean
        id:
          type: string
      additionalProperties: true
    CatalogsResponse:
      type: object
      properties:
        categories:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    CoverageStats:
      type: object
      properties:
        catalogSource:
          type: string
        totalCategories:
          type: integer
        coveredCategories:
          type: integer
        categoryCoverageRatio:
          type: number
      additionalProperties: true
    MonitorStatsResponse:
      type: object
      properties:
        coverage:
          $ref: "#/components/schemas/CoverageStats"
      additionalProperties: true
    MonitorLogsResponse:
      type: object
      properties:
        service:
          type: string
        total:
          type: integer
        logs:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true

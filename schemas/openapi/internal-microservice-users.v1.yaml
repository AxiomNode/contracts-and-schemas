openapi: 3.1.0
info:
  title: Internal Microservice Users API
  version: 1.1.0
  description: Contrato interno para identidad, perfil, telemetria y administracion de usuarios.
servers:
  - url: http://microservice-users:7102
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /users/firebase/session:
    post:
      summary: Sincroniza sesion desde Firebase token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                idToken:
                  type: string
      responses:
        "200":
          description: Sesion sincronizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionSyncResponse"
        "201":
          description: Usuario creado y sesion sincronizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionSyncResponse"
        "401":
          description: Token invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /users/me/profile:
    get:
      summary: Perfil del usuario autenticado
      responses:
        "200":
          description: Perfil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /users/me/stats:
    get:
      summary: Estadisticas del usuario autenticado
      parameters:
        - in: query
          name: recentLimit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Estadisticas con juegos recientes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStatsResponse"
        "401":
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /users/me/games/events:
    post:
      summary: Registra evento de juego
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [gameType, outcome]
              properties:
                gameType:
                  type: string
                categoryId:
                  type: string
                categoryName:
                  type: string
                outcome:
                  type: string
                  enum: [won, lost, draw]
                score:
                  type: integer
                durationSeconds:
                  type: integer
                metadata:
                  type: object
      responses:
        "201":
          description: Evento almacenado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredMessageResponse"
        "400":
          description: Payload invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /users/leaderboard:
    get:
      summary: Leaderboard publico
      parameters:
        - in: query
          name: metric
          schema:
            type: string
            enum: [won, score, played]
            default: won
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Ranking de jugadores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardResponse"
  /users/admin/roles:
    get:
      summary: Lista asignaciones de roles (SuperAdmin o Inspector)
      responses:
        "200":
          description: Lista de roles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleAssignmentsResponse"
        "403":
          description: Acceso denegado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /users/admin/roles/{firebaseUid}:
    patch:
      summary: Actualiza rol de usuario (solo SuperAdmin)
      parameters:
        - in: path
          name: firebaseUid
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [SuperAdmin, Admin, Inspector, Viewer, Gamer]
      responses:
        "200":
          description: Rol actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleUpdateResponse"
        "403":
          description: Acceso denegado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /monitor/stats:
    get:
      summary: Estadisticas de monitoreo
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorStatsResponse"
  /monitor/logs:
    get:
      summary: Logs recientes
      responses:
        "200":
          description: Logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorLogsResponse"
  /metrics:
    get:
      summary: Metricas Prometheus
      responses:
        "200":
          description: Metricas en formato text/plain
          content:
            text/plain:
              schema:
                type: string

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        service:
          type: string
      additionalProperties: true
    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        error:
          type: string
        errors:
          type: object
          additionalProperties: true
      additionalProperties: true
    SessionSyncResponse:
      type: object
      required: [message, userId, firebaseUid]
      properties:
        message:
          type: string
        userId:
          type: string
        firebaseUid:
          type: string
        provider:
          type: string
        role:
          type: string
      additionalProperties: true
    UserProfile:
      type: object
      properties:
        id:
          type: string
        firebaseUid:
          type: string
        displayName:
          type: string
        email:
          type: string
        photoURL:
          type: string
        gamesPlayed:
          type: integer
        bestScore:
          type: integer
      additionalProperties: true
    GameSummary:
      type: object
      properties:
        byGameType:
          type: object
          additionalProperties: true
        byCategory:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    ProfileResponse:
      type: object
      required: [profile, role, gameSummary]
      properties:
        profile:
          $ref: "#/components/schemas/UserProfile"
        role:
          type: string
        gameSummary:
          $ref: "#/components/schemas/GameSummary"
      additionalProperties: true
    UserStatsResponse:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/UserProfile"
        recentGames:
          type: array
          items:
            type: object
            additionalProperties: true
        byGameType:
          type: object
          additionalProperties: true
        byCategory:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    StoredMessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
      additionalProperties: true
    LeaderboardRow:
      type: object
      properties:
        firebaseUid:
          type: string
        displayName:
          type: string
        photoURL:
          type: string
        value:
          type: number
        rank:
          type: integer
      additionalProperties: true
    LeaderboardResponse:
      type: object
      required: [metric, total, rows]
      properties:
        metric:
          type: string
        total:
          type: integer
        rows:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardRow"
      additionalProperties: true
    RoleAssignment:
      type: object
      properties:
        firebaseUid:
          type: string
        role:
          type: string
        displayName:
          type: string
        email:
          type: string
      additionalProperties: true
    RoleAssignmentsResponse:
      type: object
      required: [total, users]
      properties:
        total:
          type: integer
        users:
          type: array
          items:
            $ref: "#/components/schemas/RoleAssignment"
      additionalProperties: true
    RoleUpdateResponse:
      type: object
      required: [message, user]
      properties:
        message:
          type: string
        user:
          $ref: "#/components/schemas/RoleAssignment"
      additionalProperties: true
    MonitorStatsResponse:
      type: object
      additionalProperties: true
    MonitorLogsResponse:
      type: object
      properties:
        service:
          type: string
        total:
          type: integer
        logs:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true

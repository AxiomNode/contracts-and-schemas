openapi: 3.1.0
info:
  title: Internal Microservice Users API
  version: 1.1.0
  description: Contrato interno para identidad, perfil, telemetria y administracion de usuarios.
servers:
  - url: http://microservice-users:7102
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /users/firebase/session:
    post:
      summary: Sincroniza sesion desde Firebase token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                idToken:
                  type: string
      responses:
        "200":
          description: Sesion sincronizada
        "401":
          description: Token invalido
  /users/me/profile:
    get:
      summary: Perfil del usuario autenticado
      responses:
        "200":
          description: Perfil
        "401":
          description: No autorizado
  /users/me/stats:
    get:
      summary: Estadisticas del usuario autenticado
      parameters:
        - in: query
          name: recentLimit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Estadisticas con juegos recientes
        "401":
          description: No autorizado
  /users/me/games/events:
    post:
      summary: Registra evento de juego
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [gameType, language, outcome]
              properties:
                gameType:
                  type: string
                categoryId:
                  type: string
                categoryName:
                  type: string
                language:
                  type: string
                outcome:
                  type: string
                  enum: [won, lost, draw]
                score:
                  type: integer
                durationSeconds:
                  type: integer
                metadata:
                  type: object
      responses:
        "201":
          description: Evento almacenado
        "400":
          description: Payload invalido
  /users/leaderboard:
    get:
      summary: Leaderboard publico
      parameters:
        - in: query
          name: metric
          schema:
            type: string
            enum: [won, score, played]
            default: won
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Ranking de jugadores
  /users/admin/roles:
    get:
      summary: Lista asignaciones de roles (solo SuperAdmin)
      responses:
        "200":
          description: Lista de roles
        "403":
          description: Acceso denegado
  /users/admin/roles/{firebaseUid}:
    patch:
      summary: Actualiza rol de usuario (solo SuperAdmin)
      parameters:
        - in: path
          name: firebaseUid
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [SuperAdmin, Admin, Viewer, Gamer]
      responses:
        "200":
          description: Rol actualizado
        "403":
          description: Acceso denegado
  /monitor/stats:
    get:
      summary: Estadisticas de monitoreo
      responses:
        "200":
          description: Stats
  /monitor/logs:
    get:
      summary: Logs recientes
      responses:
        "200":
          description: Logs
  /metrics:
    get:
      summary: Metricas Prometheus
      responses:
        "200":
          description: Metricas en formato text/plain

openapi: 3.1.0
info:
  title: Internal AI Engine API
  version: 1.2.0
  description: Contrato interno de generacion de contenido, ingesta RAG y catalogos.
servers:
  - url: http://ai-engine-api:7001
    description: AI Engine API (generacion e ingesta)
  - url: http://ai-engine-stats:7000
    description: AI Engine Stats (observabilidad)
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /generate/quiz:
    post:
      summary: Genera quiz estructurado
      parameters:
        - in: query
          name: category_id
          schema:
            type: string
        - in: query
          name: category_name
          schema:
            type: string
        - in: query
          name: difficulty_percentage
          schema:
            type: integer
        - in: query
          name: num_questions
          schema:
            type: integer
      responses:
        "200":
          description: Generacion exitosa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedQuizEnvelope"
        "500":
          description: Error de inferencia
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /generate/word-pass:
    post:
      summary: Genera wordpass estructurado
      parameters:
        - in: query
          name: category_id
          schema:
            type: string
        - in: query
          name: category_name
          schema:
            type: string
        - in: query
          name: difficulty_percentage
          schema:
            type: integer
        - in: query
          name: item_count
          schema:
            type: integer
        - in: query
          name: num_questions
          schema:
            type: integer
      responses:
        "200":
          description: Generacion exitosa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedWordPassEnvelope"
        "500":
          description: Error de inferencia
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /ingest/quiz:
    post:
      summary: Ingesta de documentos RAG para quiz
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                documents:
                  type: array
                  items:
                    type: object
                    required: [content]
                    properties:
                      content:
                        type: string
                      doc_id:
                        type: string
                      metadata:
                        type: object
      responses:
        "200":
          description: Ingesta exitosa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResponse"
  /ingest/word-pass:
    post:
      summary: Ingesta de documentos RAG para wordpass
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/paths/~1ingest~1quiz/post/requestBody/content/application~1json/schema"
      responses:
        "200":
          description: Ingesta exitosa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResponse"
  /catalogs:
    get:
      summary: Catalogo de categorias disponibles
      responses:
        "200":
          description: Catalogos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogsResponse"

components:
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
        total_events:
          type: integer
        correlation_id:
          type: string
        distribution_version:
          type: string
        startup:
          type: object
          additionalProperties: true
        dependencies:
          type: object
          additionalProperties: true
      additionalProperties: true
    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        error:
          type: string
      additionalProperties: true
    IngestResponse:
      type: object
      required: [ingested]
      properties:
        ingested:
          type: integer
      additionalProperties: true
    GeneratedQuizEnvelope:
      type: object
      required: [game_type, game]
      properties:
        game_type:
          type: string
          const: quiz
        game:
          $ref: "#/components/schemas/QuizGame"
        metadata:
          type: object
          additionalProperties: true
      additionalProperties: true
    GeneratedWordPassEnvelope:
      type: object
      required: [game_type, game]
      properties:
        game_type:
          type: string
          const: word-pass
        game:
          $ref: "#/components/schemas/WordPassGame"
        metadata:
          type: object
          additionalProperties: true
      additionalProperties: true
    QuizGame:
      type: object
      properties:
        game_type:
          type: string
        title:
          type: string
        difficulty_percentage:
          type: integer
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuizQuestion"
      additionalProperties: true
    QuizQuestion:
      type: object
      properties:
        question:
          type: string
        options:
          type: array
          items:
            type: string
        correct_answer:
          deprecated: true
          type: string
        correct_index:
          type: integer
        explanation:
          type: string
      additionalProperties: true
    WordPassGame:
      type: object
      properties:
        game_type:
          type: string
        title:
          type: string
        difficulty_percentage:
          type: integer
        words:
          type: array
          items:
            $ref: "#/components/schemas/WordPassEntry"
      additionalProperties: true
    WordPassEntry:
      type: object
      properties:
        letter:
          type: string
        clue:
          deprecated: true
          type: string
        hint:
          type: string
        answer:
          type: string
        starts_with:
          type: boolean
      additionalProperties: true
    CatalogsResponse:
      type: object
      properties:
        distribution_version:
          type: string
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
      additionalProperties: true
    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      additionalProperties: true

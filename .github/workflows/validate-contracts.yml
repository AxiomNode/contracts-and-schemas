name: Validate Contracts

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema openapi-spec-validator
      - name: Verify schema folders exist
        run: |
          test -d schemas/openapi
          test -d schemas/events
          test -d schemas/json
      - name: Validate OpenAPI and JSON Schemas
        run: python scripts/validate_contracts.py

name: Validate Contracts

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  lint-schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify schema folders exist
        run: |
          test -d schemas/openapi
          test -d schemas/events
          test -d schemas/json
